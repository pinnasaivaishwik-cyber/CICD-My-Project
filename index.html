<!DOCTYPE html>
<html>
<head>
    <title>My Simple Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
        }

        h2 {
            color: #3498db;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background-color: #3498db;
            color: white;
            margin: 5px auto;
            padding: 10px;
            width: 200px;
            border-radius: 5px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
        }

        a:hover {
            background-color: #27ae60;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1>

    <p>This is a simple webpage created using HTML and CSS.</p>

    <h2>About Me</h2>
    <p>Hello! I am learning web development.</p>

    <h2>My Hobbies</h2>
    <ul>
        <li>Reading</li>
        <li>Coding</li>
        <li>Playing Games</li>
    </ul>

    <a href="https://www.google.com">Visit Google</a>

</body>
</html>
